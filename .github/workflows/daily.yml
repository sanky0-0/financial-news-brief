name: Daily Financial Brief
on:
  #push:
  #  branches: [ main ]
  schedule:
    - cron: "0 14 * * *"   # runs 14:00 UTC (07:00 Los Angeles)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_TO: ${{ secrets.MAILGUN_TO }}
          ENABLE_MARKETAUX: "1"
          MARKETAUX_TARGET: "99"
          ENABLE_GDELT: "1"
          GDELT_QUERY: "finance OR market OR stocks OR earnings OR economy"
          GDELT_MAXREC: "200"
          GDELT_HOURS_BACK: "24"
          GDELT_GKG_MAXREC: "300"
          GDELT_DEBUG: "0"
        run: python daily_brief.py
      - name: Commit site & outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs out data/raw || true
          git commit -m "Auto: daily brief $(date -u +'%Y-%m-%d')" || echo "No changes"
          git push